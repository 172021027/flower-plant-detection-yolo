# YOLO模型训练配置文件
# 花草检测项目专用配置

# 模型配置
model:
  name: "yolov8n"  # 模型大小: n(nano), s(small), m(medium), l(large), x(xlarge)
  pretrained: true
  freeze_backbone: false

# 训练超参数
training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

# 数据增强
augmentation:
  hsv_h: 0.015      # 色调调整范围
  hsv_s: 0.7        # 饱和度调整范围  
  hsv_v: 0.4        # 明度调整范围
  degrees: 0.0      # 旋转角度范围
  translate: 0.1    # 平移范围
  scale: 0.5        # 缩放范围
  shear: 0.0        # 剪切变换
  perspective: 0.0  # 透视变换
  flipud: 0.0       # 垂直翻转概率
  fliplr: 0.5       # 水平翻转概率
  mosaic: 1.0       # Mosaic数据增强概率
  mixup: 0.0        # MixUp数据增强概率
  copy_paste: 0.0   # Copy-Paste数据增强概率

# 模型架构
architecture:
  nc: 8             # 类别数量 (8种花草)
  depth_multiple: 0.33    # 深度倍数
  width_multiple: 0.25    # 宽度倍数

# 损失函数权重
loss:
  cls: 0.5          # 分类损失权重
  box: 7.5          # 边界框损失权重
  dfl: 1.5          # 分布焦点损失权重

# 优化器设置
optimizer:
  name: "SGD"       # 优化器类型: SGD, Adam, AdamW
  lr0: 0.01         # 初始学习率
  lrf: 0.01         # 最终学习率因子
  
# 学习率调度
scheduler:
  name: "linear"    # 调度器类型: linear, cosine
  
# 验证设置
validation:
  val_freq: 1       # 验证频率 (每n个epoch验证一次)
  save_period: -1   # 保存周期 (-1表示仅保存最佳模型)

# 设备和性能
device:
  gpu_id: 0         # GPU设备ID (-1表示使用CPU)
  workers: 8        # 数据加载进程数
  amp: true         # 是否使用混合精度训练

# 输入图像设置
image:
  size: 640         # 输入图像尺寸
  rect: false       # 是否使用矩形训练
  single_cls: false # 是否单类别训练

# 推理设置
inference:
  conf_threshold: 0.25    # 置信度阈值
  iou_threshold: 0.45     # NMS IoU阈值
  max_det: 300           # 最大检测数量
  agnostic_nms: false    # 类别无关的NMS

# 日志和保存
logging:
  project: "flower_detection"  # 项目名称
  name: "yolo_flower"          # 实验名称
  save_dir: "./runs/train"     # 保存目录
  exist_ok: false              # 是否覆盖已存在的实验
  verbose: true                # 详细输出

# 回调和监控
callbacks:
  tensorboard: true      # 是否使用TensorBoard
  wandb: false          # 是否使用Weights & Biases
  early_stop:
    patience: 50        # 早停耐心值
    min_delta: 0.001    # 最小改进阈值